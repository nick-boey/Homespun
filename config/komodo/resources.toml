# Komodo Resource Sync - Homespun Stack
#
# This file declares the Homespun application stack for Komodo management.
# Komodo's Resource Sync feature reads this TOML to register, deploy, and
# auto-update the stack when newer images are pushed to GHCR.
#
# Setup (one-time):
#   1. Create a Resource Sync in Komodo UI named "homespun-resources"
#      pointing to repo nick-boey/Homespun, branch main,
#      resource path config/komodo/resources.toml
#   2. Click "Sync" to import both the resource_sync and stack definitions
#   3. From the "homespun" Stack page, click "Deploy"
#   After this, the resource_sync below keeps itself up-to-date automatically.
#
# Prerequisites:
#   - Komodo installed and running (scripts/install-komodo.sh + scripts/run-komodo.sh,
#     or any other route).
#   - Git account "nick-boey" configured in Komodo with GitHub repo read access.
#   - All Komodo Variables the stack references are set in Settings → Variables.
#     Full list and derivation instructions live in the [[stack]].description
#     field below, and in docs/AZURE_DEPLOYMENT.md#komodo-variables.

## ── Resource Sync (self-referential) ─────────────────────────────────
# After the one-time manual setup, this entry keeps the sync self-managing.
# Changes pushed to main are picked up automatically.

[[resource_sync]]
name = "homespun-resources"
description = "Syncs Homespun stack definitions from the GitHub repo"

[resource_sync.config]
repo = "nick-boey/Homespun"
branch = "main"
resource_path = ["config/komodo/resources.toml"]

## ── Stack ────────────────────────────────────────────────────────────

[[stack]]
name = "homespun"
description = """
Homespun - React web app for managing development features and AI agents.

This stack reads the following Komodo Variables — deploys will fail with
"undefined volume [[HOMESPUN_HOME]]/..." until every row below is defined in
Settings → Variables. See docs/AZURE_DEPLOYMENT.md#komodo-variables for
details (including how to derive each host-specific value).

Secrets (set once per Komodo instance):
  GITHUB_TOKEN             GitHub PAT with `repo` scope.
  CLAUDE_CODE_OAUTH_TOKEN  Copy from ~/.claude/.credentials.json after `claude login`.
  GRAFANA_ADMIN_PASSWORD   Grafana admin password for the bundled dashboard.

Release knob:
  HOMESPUN_TAG             Image tag — `latest`, `alpha`, or a specific version.

Host-specific (per server running the Komodo Periphery that hosts this stack):
  HOMESPUN_HOME  Admin user's home dir, e.g. /home/azureuser. Used as the
                 base for DATA_DIR, SSH_DIR, CLAUDE_CREDENTIALS bind mounts.
                 Derive: `echo $HOME` on the host as the admin user.
  HOST_UID       Admin user's UID. Derive: `id -u`.
  HOST_GID       Admin user's primary GID. Derive: `id -g`.
  DOCKER_GID     GID of /var/run/docker.sock — the Homespun container needs
                 this group to spawn agent containers (Docker-out-of-Docker).
                 Derive: `stat -c '%g' /var/run/docker.sock`. Varies by
                 distro (e.g. Ubuntu 22.04 ships docker-ce with GID 987).

On VMs provisioned via scripts/install-komodo.sh the four host-specific
values are auto-synced by scripts/sync-komodo-vars.sh. On any other install
(existing Komodo instance, manual install, non-Azure host) create them by
hand in the Komodo UI before the first deploy.
"""
tags = ["homespun"]

[stack.config]
server_id = "Local"
repo = "nick-boey/Homespun"
branch = "main"
file_paths = ["docker-compose.yml"]
auto_update = true
poll_for_updates = true
# [[VAR]] placeholders below are resolved against Komodo's Variable store when
# Komodo writes the stack's .env. Any unset Variable is emitted as a literal
# [[VAR]] string, which breaks `docker compose pull` with "undefined volume"
# (compose parses `[[HOMESPUN_HOME]]/...` as a named-volume reference).
# If you hit that error: create the missing Variables in Settings → Variables.
# Full variable reference: see the stack description field above.
environment = """
HOMESPUN_IMAGE=ghcr.io/nick-boey/homespun:[[HOMESPUN_TAG]]
WORKER_IMAGE=ghcr.io/nick-boey/homespun-worker:[[HOMESPUN_TAG]]
WEB_IMAGE=ghcr.io/nick-boey/homespun-web:[[HOMESPUN_TAG]]
COMPOSE_PROFILES=plg
CONTAINER_NAME=homespun
HOST_PORT=8080
HOST_UID=[[HOST_UID]]
HOST_GID=[[HOST_GID]]
DOCKER_GID=[[DOCKER_GID]]
DATA_DIR=[[HOMESPUN_HOME]]/.homespun-container/data
SSH_DIR=[[HOMESPUN_HOME]]/.ssh
CLAUDE_CREDENTIALS=[[HOMESPUN_HOME]]/.claude/.credentials.json
ASPNETCORE_ENVIRONMENT=Production
AGENT_MODE=Docker
GITHUB_TOKEN=[[GITHUB_TOKEN]]
CLAUDE_CODE_OAUTH_TOKEN=[[CLAUDE_CODE_OAUTH_TOKEN]]
MINI_PROMPT_SIDECAR_URL=http://homespun-worker:8080
GRAFANA_PORT=3000
GRAFANA_ADMIN_PASSWORD=[[GRAFANA_ADMIN_PASSWORD]]
"""
