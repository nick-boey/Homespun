#cloud-config

# Homespun VM cloud-init configuration
# Installs Docker, clones the repository, and starts Homespun containers

package_update: true
package_upgrade: true

packages:
  - apt-transport-https
  - ca-certificates
  - curl
  - gnupg
  - lsb-release
  - git
  - jq
  - unzip

write_files:
  - path: /etc/homespun/env
    permissions: "0600"
    content: |
      export HSP_GITHUB_TOKEN=__GITHUB_TOKEN__
      export HSP_CLAUDE_CODE_OAUTH_TOKEN=__CLAUDE_CODE_OAUTH_TOKEN__
      export HSP_TAILSCALE_AUTH_KEY=__TAILSCALE_AUTH_KEY__
      export HOMESPUN_DOMAIN_NAME=__DOMAIN_NAME__

  - path: /opt/homespun/setup.sh
    permissions: "0755"
    content: |
      #!/bin/bash
      set -euo pipefail

      LOG_FILE="/var/log/homespun-setup.log"
      exec > >(tee -a "$LOG_FILE") 2>&1

      echo "=== Homespun Setup Started: $(date) ==="

      # Source secrets
      source /etc/homespun/env

      # Install Docker
      echo "Installing Docker..."
      curl -fsSL https://get.docker.com | sh
      usermod -aG docker homespun

      # Install Docker Compose plugin (included with Docker, but ensure latest)
      echo "Docker version: $(docker --version)"
      echo "Docker Compose version: $(docker compose version)"

      # Create homespun user if not exists
      if ! id -u homespun &>/dev/null; then
        useradd --create-home --shell /bin/bash homespun
        usermod -aG docker homespun
      fi

      # Set up credentials directory
      mkdir -p /home/homespun/.homespun
      cat > /home/homespun/.homespun/env << EOF
      export GITHUB_TOKEN=${HSP_GITHUB_TOKEN}
      export CLAUDE_CODE_OAUTH_TOKEN=${HSP_CLAUDE_CODE_OAUTH_TOKEN}
      export TAILSCALE_AUTH_KEY=${HSP_TAILSCALE_AUTH_KEY}
      EOF
      chmod 600 /home/homespun/.homespun/env
      chown -R homespun:homespun /home/homespun/.homespun

      # Clone repository
      echo "Cloning Homespun repository..."
      REPO_DIR="/opt/homespun/repo"
      if [ ! -d "$REPO_DIR" ]; then
        git clone https://github.com/nick-boey/Homespun.git "$REPO_DIR"
      else
        cd "$REPO_DIR" && git pull
      fi
      chown -R homespun:homespun "$REPO_DIR"

      # Create Docker network
      docker network create homespun-net 2>/dev/null || true

      # Create data directories
      mkdir -p /home/homespun/.homespun-container/data
      chown -R homespun:homespun /home/homespun/.homespun-container

      # Set up SSL with Let's Encrypt if domain is configured
      DOMAIN_NAME="${HOMESPUN_DOMAIN_NAME:-}"
      if [ -n "$DOMAIN_NAME" ] && [ "$DOMAIN_NAME" != "__DOMAIN_NAME__" ]; then
        echo "Setting up SSL for $DOMAIN_NAME..."
        apt-get install -y certbot
        certbot certonly --standalone --non-interactive --agree-tos \
          --email "admin@${DOMAIN_NAME}" \
          -d "$DOMAIN_NAME" || echo "SSL setup failed - continuing without SSL"

        # Set up auto-renewal
        systemctl enable certbot.timer
        systemctl start certbot.timer
      fi

      # Configure environment for run.sh
      export HOME=/home/homespun
      export HSP_EXTERNAL_HOSTNAME="${DOMAIN_NAME:-}"

      # Start Homespun using run.sh
      echo "Starting Homespun..."
      cd "$REPO_DIR"
      sudo -u homespun bash -c "
        source /home/homespun/.homespun/env
        export HOME=/home/homespun
        export HSP_EXTERNAL_HOSTNAME='${DOMAIN_NAME:-}'
        ./scripts/run.sh --pull
      "

      echo "=== Homespun Setup Complete: $(date) ==="
      echo "Access Homespun at http://\$(curl -s ifconfig.me):8080"

  - path: /etc/systemd/system/homespun.service
    permissions: "0644"
    content: |
      [Unit]
      Description=Homespun Application
      After=docker.service
      Requires=docker.service

      [Service]
      Type=oneshot
      RemainAfterExit=yes
      User=homespun
      EnvironmentFile=/etc/homespun/env
      WorkingDirectory=/opt/homespun/repo
      ExecStart=/bin/bash -c 'source /home/homespun/.homespun/env && ./scripts/run.sh --pull'
      ExecStop=/bin/bash -c './scripts/run.sh --stop'

      [Install]
      WantedBy=multi-user.target

runcmd:
  - /opt/homespun/setup.sh
  - systemctl daemon-reload
  - systemctl enable homespun.service
