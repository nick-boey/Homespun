#cloud-config

# Homespun VM cloud-init configuration
# Installs Docker, clones the repository, and starts Homespun + Komodo
# containers.
#
# Placeholders (__XXX__) are replaced by main.bicep at deploy time with values
# from .env (via deploy-infra.sh) before the template is base64-encoded.

package_update: true
package_upgrade: true

packages:
  - apt-transport-https
  - ca-certificates
  - curl
  - gnupg
  - lsb-release
  - git
  - jq
  - unzip
  - openssl  # used by install-komodo.sh to generate secrets

write_files:
  # Repo .env template. After the repo is cloned this is copied to
  # <repo>/.env, which is the sole credential source read by run.sh.
  - path: /opt/homespun/.env-template
    permissions: "0600"
    content: |
      GITHUB_TOKEN=__GITHUB_TOKEN__
      CLAUDE_CODE_OAUTH_TOKEN=__CLAUDE_CODE_OAUTH_TOKEN__
      TAILSCALE_AUTH_KEY=__TAILSCALE_AUTH_KEY__
      HSP_EXTERNAL_HOSTNAME=__DOMAIN_NAME__

  - path: /opt/homespun/setup.sh
    permissions: "0755"
    content: |
      #!/bin/bash
      set -euo pipefail

      LOG_FILE="/var/log/homespun-setup.log"
      exec > >(tee -a "$LOG_FILE") 2>&1

      echo "=== Homespun Setup Started: $(date) ==="

      # Install Docker
      echo "Installing Docker..."
      curl -fsSL https://get.docker.com | sh

      echo "Docker version: $(docker --version)"
      echo "Docker Compose version: $(docker compose version)"

      # Create homespun user if not exists
      if ! id -u homespun &>/dev/null; then
        useradd --create-home --shell /bin/bash homespun
      fi
      usermod -aG docker homespun

      # Clone repository
      echo "Cloning Homespun repository..."
      REPO_DIR="/opt/homespun/repo"
      if [ ! -d "$REPO_DIR" ]; then
        git clone https://github.com/nick-boey/Homespun.git "$REPO_DIR"
      else
        cd "$REPO_DIR" && git pull
      fi
      chown -R homespun:homespun "$REPO_DIR"

      # Materialize the repo .env from the template written by cloud-init.
      # This is the single configuration source for run.sh on the VM.
      install -o homespun -g homespun -m 600 \
        /opt/homespun/.env-template \
        "$REPO_DIR/.env"

      # Create Docker network
      docker network create homespun-net 2>/dev/null || true

      # Create data directories
      mkdir -p /home/homespun/.homespun-container/data
      chown -R homespun:homespun /home/homespun/.homespun-container

      # Set up SSL with Let's Encrypt if domain is configured
      DOMAIN_NAME="__DOMAIN_NAME__"
      if [ -n "$DOMAIN_NAME" ] && [ "$DOMAIN_NAME" != "__DOMAIN_NAME__" ]; then
        echo "Setting up SSL for $DOMAIN_NAME..."
        apt-get install -y certbot
        certbot certonly --standalone --non-interactive --agree-tos \
          --email "admin@${DOMAIN_NAME}" \
          -d "$DOMAIN_NAME" || echo "SSL setup failed - continuing without SSL"

        # Set up auto-renewal
        systemctl enable certbot.timer
        systemctl start certbot.timer
      fi

      # Start Homespun using run.sh - it reads $REPO_DIR/.env itself
      echo "Starting Homespun..."
      cd "$REPO_DIR"
      sudo -u homespun HOME=/home/homespun ./scripts/run.sh --pull

      # Install and start Komodo for container management.
      # Failures here are non-fatal so a broken Komodo install doesn't take
      # down the Homespun deployment.
      echo "Installing Komodo..."
      if ./scripts/install-komodo.sh; then
        echo "Starting Komodo..."
        if ./scripts/run-komodo.sh; then
          echo "Komodo started. Admin credentials are in /etc/komodo/compose.env"
          echo "Retrieve the generated admin password with:"
          echo "  sudo grep KOMODO_INIT_ADMIN /etc/komodo/compose.env"
        else
          echo "WARNING: run-komodo.sh failed - Komodo is not running."
        fi
      else
        echo "WARNING: install-komodo.sh failed - Komodo will not be available."
      fi

      echo "=== Homespun Setup Complete: $(date) ==="
      echo "Access Homespun at http://\$(curl -s ifconfig.me):8080"
      echo "Access Komodo (via Tailscale) at https://<tailscale-hostname>:3500"

  - path: /etc/systemd/system/homespun.service
    permissions: "0644"
    content: |
      [Unit]
      Description=Homespun Application
      After=docker.service
      Requires=docker.service

      [Service]
      Type=oneshot
      RemainAfterExit=yes
      User=homespun
      WorkingDirectory=/opt/homespun/repo
      ExecStart=/opt/homespun/repo/scripts/run.sh --pull
      ExecStop=/opt/homespun/repo/scripts/run.sh --stop

      [Install]
      WantedBy=multi-user.target

runcmd:
  - /opt/homespun/setup.sh
  - systemctl daemon-reload
  - systemctl enable homespun.service
