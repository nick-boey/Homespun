name: OTLP Pipeline Smoke

on:
  pull_request:
    branches: ["main"]
    paths:
      - "src/Homespun.AppHost/**"
      - "src/Homespun.Worker/**"
      - "src/Homespun.Server/Program.cs"
      - "src/Homespun.Server/Features/Observability/**"
      - "src/Homespun.Server/Features/Testing/MockServiceExtensions.cs"
      - "src/Homespun.Web/nginx.conf.template"
      - "src/Homespun.Web/nginx-log-format.conf"
      - "src/Homespun.Web/Dockerfile"
      - "config/otel-collector-config.yml"
      - "config/grafana/provisioning/**"
      - "config/loki-config.yml"
      - ".github/workflows/otlp-pipeline-smoke.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: otlp-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  loki-service-labels:
    name: AppHost (dev-container) → Loki service_name labels
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install Aspire workload
        run: dotnet workload install aspire

      - name: Restore
        run: dotnet restore

      - name: Boot AppHost (dev-container) in background
        env:
          CI: "true"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CLAUDE_CODE_OAUTH_TOKEN: ci-dummy-token
        run: |
          set -euo pipefail
          dotnet run \
            --project src/Homespun.AppHost \
            --launch-profile dev-container \
            > apphost.log 2>&1 &
          echo $! > apphost.pid

      - name: Wait for server /health
        run: |
          set -euo pipefail
          for i in $(seq 1 60); do
            if curl -sSf http://localhost:5101/health >/dev/null 2>&1; then
              echo "server healthy after ${i}s"
              exit 0
            fi
            sleep 5
          done
          echo "server never became healthy"
          tail -200 apphost.log || true
          exit 1

      - name: Soak 30s so first OTLP batches flush
        run: sleep 30

      - name: Assert Loki has service_name=server and service_name=worker
        run: |
          set -euo pipefail
          resp=$(curl -sSf 'http://localhost:3100/loki/api/v1/label/service_name/values')
          echo "Loki response: $resp"
          echo "$resp" | python3 -c 'import json,sys; d=json.load(sys.stdin); v=set(d.get("data",[])); assert "server" in v, f"missing server in {v}"; assert "worker" in v, f"missing worker in {v}"'

      - name: Dump AppHost log on failure
        if: failure()
        run: tail -500 apphost.log || true

      - name: Stop AppHost
        if: always()
        run: |
          if [ -f apphost.pid ]; then
            kill "$(cat apphost.pid)" 2>/dev/null || true
          fi
