name: CI

on:
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore --configuration Release

    - name: Test
      run: dotnet test --no-build --configuration Release --verbosity normal
      env:
        E2E_CONFIGURATION: Release

  worker-build:
    name: Build and Test Worker
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22

    - name: Install dependencies
      run: cd src/Homespun.Worker && npm ci

    - name: Build
      run: cd src/Homespun.Worker && npm run build

    - name: Test
      run: cd src/Homespun.Worker && npm test

  web-build:
    name: Build and Test Web Client
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22

    - name: Install dependencies
      run: cd src/Homespun.Web && npm ci

    - name: Lint
      run: cd src/Homespun.Web && npm run lint

    - name: Type check
      run: cd src/Homespun.Web && npm run typecheck

    - name: Test
      run: cd src/Homespun.Web && npm test

    - name: Build
      run: cd src/Homespun.Web && npm run build

  web-e2e:
    name: E2E Tests (Web Client)
    runs-on: ubuntu-latest
    needs: [build-and-test, web-build]

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22

    - name: Install Node dependencies
      run: cd src/Homespun.Web && npm ci

    - name: Install Playwright Browsers
      run: cd src/Homespun.Web && npx playwright install chromium --with-deps

    - name: Restore .NET dependencies
      run: dotnet restore

    - name: Build .NET Server
      run: dotnet build --no-restore --configuration Release

    - name: Run E2E tests
      run: cd src/Homespun.Web && npm run test:e2e
      env:
        CI: true

    - name: Upload Playwright Report
      uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: src/Homespun.Web/playwright-report/
        retention-days: 30
