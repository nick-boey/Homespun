# Docker Compose for Homespun with PLG Logging Stack
# Tailscale is managed separately via config/tailscale/compose.yml
# Usage:
#   docker compose up -d                  # Start Homespun only
#   docker compose --profile plg up -d    # Start with PLG logging stack
#   docker compose down                   # Stop all services
#   docker compose logs -f                # Follow all logs
#
# Environment variables are provided via .env.compose, which is generated by
# scripts/run.sh and scripts/run.ps1. run.sh loads user-facing credentials
# (GITHUB_TOKEN, CLAUDE_CODE_OAUTH_TOKEN, TAILSCALE_AUTH_KEY, HSP_EXTERNAL_HOSTNAME)
# from the .env file at the repo root (copy .env.example to .env) and combines
# them with dynamically computed values (HOST_UID, DOCKER_GID, DATA_DIR, etc.).
#
# Keys referenced by this file:
#   HOMESPUN_IMAGE          - Main Homespun image (default: ghcr.io/nick-boey/homespun:latest)
#   WORKER_IMAGE            - Worker image (default: ghcr.io/nick-boey/homespun-worker:latest)
#   WEB_IMAGE               - React frontend image (default: ghcr.io/nick-boey/homespun-web:latest)
#   CONTAINER_NAME          - Container name (default: homespun)
#   HOST_PORT               - Host port for Homespun (default: 8080)
#   WEB_PORT                - Host port for React frontend (default: 3001)
#   HOST_UID, HOST_GID      - User/group IDs for file permissions
#   DOCKER_GID              - Docker socket GID for DooD
#   DATA_DIR, SSH_DIR       - Host paths mounted into the container
#   CLAUDE_CREDENTIALS      - Path to Claude OAuth credentials file
#   GITHUB_TOKEN            - GitHub personal access token
#   CLAUDE_CODE_OAUTH_TOKEN - Claude Code OAuth token
#   HSP_EXTERNAL_HOSTNAME   - External hostname for agent URLs (optional)
#   GRAFANA_PORT            - Grafana port (default: 3000)
#   GRAFANA_ADMIN_PASSWORD  - Grafana admin password (default: admin)
#   MINI_PROMPT_SIDECAR_URL - URL for mini-prompt sidecar (default: http://homespun-worker:8080)

services:
  # Main Homespun application
  homespun:
    image: ${HOMESPUN_IMAGE:-ghcr.io/nick-boey/homespun:latest}
    container_name: ${CONTAINER_NAME:-homespun}
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    ports:
      - "${HOST_PORT:-8080}:8080"
    volumes:
      - ${DATA_DIR:-~/.homespun-container/data}:/data
      - ${SSH_DIR:-~/.ssh}:/home/homespun/.ssh:ro
      - ${CLAUDE_CREDENTIALS:-/dev/null}:/home/homespun/.claude/.credentials.json:ro
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - HOME=/home/homespun
      - HSP_HOST_DATA_PATH=${DATA_DIR:-~/.homespun-container/data}
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Production}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - CLAUDE_CODE_OAUTH_TOKEN=${CLAUDE_CODE_OAUTH_TOKEN:-}
      - HSP_EXTERNAL_HOSTNAME=${HSP_EXTERNAL_HOSTNAME:-}
      - AgentExecution__Mode=${AGENT_MODE:-Docker}
      - AgentExecution__Docker__WorkerImage=${WORKER_IMAGE:-ghcr.io/nick-boey/homespun-worker:latest}
      - AgentExecution__Docker__NetworkName=homespun-net
      - MiniPrompt__SidecarUrl=${MINI_PROMPT_SIDECAR_URL:-http://homespun-worker:8080}
    group_add:
      - ${DOCKER_GID:-999}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - homespun-net
    labels:
      - "logging=promtail"
      - "logging_jobname=homespun-server"
    depends_on:
      worker:
        condition: service_healthy
        required: false
      loki:
        condition: service_started
        required: false

  # Worker - Sidecar container for mini prompts and lightweight AI tasks
  worker:
    image: ${WORKER_IMAGE:-ghcr.io/nick-boey/homespun-worker:latest}
    container_name: homespun-worker
    restart: unless-stopped
    networks:
      - homespun-net
    environment:
      - PORT=8080
      - CLAUDE_CODE_OAUTH_TOKEN=${CLAUDE_CODE_OAUTH_TOKEN:-}
      # DEBUG_AGENT_SDK enables structured stdout capture of every message
      # crossing the @anthropic-ai/claude-agent-sdk boundary. On by default;
      # export DEBUG_AGENT_SDK=false in your host env to turn it off.
      - DEBUG_AGENT_SDK=${DEBUG_AGENT_SDK:-true}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      - "logging=promtail"
      - "logging_jobname=homespun-worker"
    depends_on:
      loki:
        condition: service_started
        required: false

  # React Frontend - Vite-based React application
  web:
    image: ${WEB_IMAGE:-ghcr.io/nick-boey/homespun-web:latest}
    container_name: homespun-web
    ports:
      - "${WEB_PORT:-3001}:80"
    environment:
      - VITE_API_URL=http://homespun:8080
    restart: unless-stopped
    networks:
      - homespun-net
    labels:
      - "logging=promtail"
      - "logging_jobname=homespun-web"
    depends_on:
      homespun:
        condition: service_healthy
        required: false
      loki:
        condition: service_started
        required: false

  # Loki - Log aggregation
  loki:
    image: grafana/loki:3.6.6
    container_name: homespun-loki
    profiles: ["plg"]
    ports:
      - "${LOKI_PORT:-3100}:3100"
    volumes:
      - ./config/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped
    networks:
      - homespun-net
  # Promtail - Log collector
  promtail:
    image: grafana/promtail:3.6.6
    container_name: homespun-promtail
    profiles: ["plg"]
    volumes:
      - ./config/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yml
    restart: unless-stopped
    networks:
      - homespun-net
    depends_on:
      loki:
        condition: service_started

  # Grafana - Visualization
  grafana:
    image: grafana/grafana:12.3.3
    container_name: homespun-grafana
    profiles: ["plg"]
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - ./config/grafana/grafana.ini:/etc/grafana/grafana.ini:ro
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    restart: unless-stopped
    networks:
      - homespun-net
    depends_on:
      loki:
        condition: service_started

networks:
  homespun-net:
    external: true

volumes:
  loki-data:
  grafana-data:
