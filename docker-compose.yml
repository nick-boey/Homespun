# Docker Compose for Homespun with Seq observability sink
# Tailscale is managed separately via config/tailscale/compose.yml
# Usage:
#   docker compose up -d                  # Start Homespun + Seq
#   docker compose down                   # Stop all services
#   docker compose logs -f                # Follow all logs
#
# Environment variables are provided via .env.compose, generated by the prod
# deployment tooling (Komodo / cloud-init). User-facing credentials
# (GITHUB_TOKEN, CLAUDE_CODE_OAUTH_TOKEN, TAILSCALE_AUTH_KEY, HSP_EXTERNAL_HOSTNAME)
# are loaded from the .env file at the repo root (copy .env.example to .env)
# and combined with dynamically computed values (HOST_UID, DOCKER_GID,
# DATA_DIR, etc.). Local dev uses the Aspire AppHost instead of this file.
#
# Keys referenced by this file:
#   HOMESPUN_IMAGE          - Main Homespun image (default: ghcr.io/nick-boey/homespun:latest)
#   WORKER_IMAGE            - Worker image (default: ghcr.io/nick-boey/homespun-worker:latest)
#   WEB_IMAGE               - React frontend image (default: ghcr.io/nick-boey/homespun-web:latest)
#   CONTAINER_NAME          - Container name (default: homespun)
#   HOST_PORT               - Host port for Homespun (default: 8080)
#   WEB_PORT                - Host port for React frontend (default: 3001)
#   HOST_UID, HOST_GID      - User/group IDs for file permissions
#   DOCKER_GID              - Docker socket GID for DooD
#   DATA_DIR, SSH_DIR       - Host paths mounted into the container
#   CLAUDE_CREDENTIALS      - Path to Claude OAuth credentials file
#   GITHUB_TOKEN            - GitHub personal access token
#   CLAUDE_CODE_OAUTH_TOKEN - Claude Code OAuth token
#   HSP_EXTERNAL_HOSTNAME   - External hostname for agent URLs (optional)
#   SEQ_PORT                - Seq UI + OTLP ingest port (default: 5341)
#   SEQ_API_KEY             - Seq ingestion API key (required in prod; empty in dev)
#   MINI_PROMPT_SIDECAR_URL - URL for mini-prompt sidecar (default: http://homespun-worker:8080)
#   WORKER_HOST_PORT        - Host port exposed for the worker container (default: 8081)
#                             Legacy compose flag; leave unset in production.

services:
  # Main Homespun application
  homespun:
    image: ${HOMESPUN_IMAGE:-ghcr.io/nick-boey/homespun:latest}
    container_name: ${CONTAINER_NAME:-homespun}
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    ports:
      - "${HOST_PORT:-8080}:8080"
    volumes:
      - ${DATA_DIR:-~/.homespun-container/data}:/data
      - ${SSH_DIR:-~/.ssh}:/home/homespun/.ssh:ro
      - ${CLAUDE_CREDENTIALS:-/dev/null}:/home/homespun/.claude/.credentials.json:ro
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - HOME=/home/homespun
      - HSP_HOST_DATA_PATH=${DATA_DIR:-~/.homespun-container/data}
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Production}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - CLAUDE_CODE_OAUTH_TOKEN=${CLAUDE_CODE_OAUTH_TOKEN:-}
      - HSP_EXTERNAL_HOSTNAME=${HSP_EXTERNAL_HOSTNAME:-}
      - AgentExecution__Mode=${AGENT_MODE:-Docker}
      - AgentExecution__Docker__WorkerImage=${WORKER_IMAGE:-ghcr.io/nick-boey/homespun-worker:latest}
      - AgentExecution__Docker__NetworkName=homespun-net
      - MiniPrompt__SidecarUrl=${MINI_PROMPT_SIDECAR_URL:-http://homespun-worker:8080}
      - ConnectionStrings__seq=http://seq:5341
      - OTEL_EXPORTER_OTLP_HEADERS=X-Seq-ApiKey=${SEQ_API_KEY:-}
      # OtlpFanout receiver: worker/client ship OTLP into the server, which
      # scrubs + forwards to Seq via /ingest/otlp. Prod has no Aspire dashboard,
      # so OTEL_EXPORTER_OTLP_ENDPOINT is deliberately absent here — absent env
      # tells OtlpFanout to skip the Aspire leg.
      - OtlpFanout__SeqBaseUrl=http://seq:5341/ingest/otlp
      - OtlpFanout__SeqApiKey=${SEQ_API_KEY:-}
    group_add:
      - ${DOCKER_GID:-999}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - homespun-net
    depends_on:
      worker:
        condition: service_healthy
        required: false
      seq:
        condition: service_healthy
        required: false

  # Worker - Sidecar container for mini prompts and lightweight AI tasks
  worker:
    image: ${WORKER_IMAGE:-ghcr.io/nick-boey/homespun-worker:latest}
    container_name: homespun-worker
    restart: unless-stopped
    ports:
      - "${WORKER_HOST_PORT:-8081}:8080"
    networks:
      - homespun-net
    environment:
      - PORT=8080
      - CLAUDE_CODE_OAUTH_TOKEN=${CLAUDE_CODE_OAUTH_TOKEN:-}
      # DEBUG_AGENT_SDK enables structured stdout capture of every message
      # crossing the @anthropic-ai/claude-agent-sdk boundary. On by default;
      # export DEBUG_AGENT_SDK=false in your host env to turn it off.
      - DEBUG_AGENT_SDK=${DEBUG_AGENT_SDK:-true}
      - ConnectionStrings__seq=http://seq:5341
      - OTEL_EXPORTER_OTLP_HEADERS=X-Seq-ApiKey=${SEQ_API_KEY:-}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      seq:
        condition: service_healthy
        required: false

  # React Frontend - Vite-based React application
  web:
    image: ${WEB_IMAGE:-ghcr.io/nick-boey/homespun-web:latest}
    container_name: homespun-web
    ports:
      - "${WEB_PORT:-3001}:80"
    environment:
      - VITE_API_URL=http://homespun:8080
    restart: unless-stopped
    networks:
      - homespun-net
    depends_on:
      homespun:
        condition: service_healthy
        required: false

  # Seq - events-first log + trace store. OTLP ingest + UI both on port 5341.
  seq:
    image: datalust/seq:2024.3
    container_name: homespun-seq
    ports:
      - "${SEQ_PORT:-5341}:80"
    volumes:
      - seq-data:/data
    environment:
      - ACCEPT_EULA=Y
      - SEQ_API__INGESTION__APIKEYS__0__TOKEN=${SEQ_API_KEY:-}
    restart: unless-stopped
    networks:
      - homespun-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  homespun-net:
    external: true

volumes:
  seq-data:
